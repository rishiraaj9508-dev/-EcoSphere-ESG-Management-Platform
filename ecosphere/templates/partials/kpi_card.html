<div class="bg-gray-900 border border-gray-800 rounded-xl p-5 hover:border-gray-700 transition-all duration-300">
    <p class="text-xs text-gray-500 font-semibold uppercase tracking-wider mb-1">{{ label }}</p>
    <div class="flex items-baseline gap-1.5">
        <p class="text-3xl font-bold text-white">{{ value }}</p>
        <span class="text-xs text-gray-500">/ 100</span>
    </div>
    {% if trend_text %}
        <p class="text-xs mt-2 {% if trend_type == 'up' %}text-green-400{% elif trend_type == 'down' %}text-red-400{% else %}text-gray-400{% endif %} flex items-center gap-1 font-medium">
            {% if trend_type == 'up' %}
                <span>▲</span>
            {% elif trend_type == 'down' %}
                <span>▼</span>
            {% endif %}
            <span>{{ trend_text }}</span>
        </p>
    {% endif %}
</div>
